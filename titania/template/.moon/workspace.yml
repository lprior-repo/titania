# MOON CI/CD IS THE ABSOLUTE FOUNDATION FOR ALL OF THIS WORK.
# Titania-check is a Moon-native build orchestrator; every quality lane
# (fmt, lint-src, clippy, dylint, ast-grep, titania-check) is a Moon task
# driven through `moon ci`. Without Moon there is no Titania.

# Schema: https://moonrepo.dev/schemas/workspace.json
$schema: 'https://moonrepo.dev/schemas/workspace.json'

vcs:
  client: git
  provider: github
  defaultBranch: main
  # cargo-generate initializes Git before any commit exists; avoid Moon VCS hook
  # sync until the generated workspace has a real HEAD.
  sync: false

versionConstraint: '>=2.0.0'

# Single-project workspace: the titania Cargo workspace IS the only
# Moon project. tasks in tasks/all.yml inherit into this project.
projects:
  titania: '.'

# Hash strategy. 'accuracy' for CI (lockfile-aware), 'performance' for dev.
hasher:
  optimization: 'accuracy'
  # Generated workspaces start with an unborn Git HEAD; glob walking keeps the
  # first `titania-check --scope prepush` usable before the initial commit.
  walkStrategy: 'glob'

# Auto-install dependencies and sync workspace state on every `moon ci`.
pipeline:
  installDependencies: true
  syncWorkspace: false
  cacheLifetime: '7 days'

telemetry: false
