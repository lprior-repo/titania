fileGroups:
  sources:
    - 'src/**/*.rs'
    - 'crates/**/*.rs'
    - 'Cargo.toml'
    - 'Cargo.lock'
    - '.cargo/**'
    - '.titania/profiles/**'
    - 'rust-toolchain.toml'
  tests:
    - 'tests/**/*.rs'
    - 'crates/**/tests/**/*.rs'
    - 'crates/**/benches/**/*.rs'
    - 'crates/**/examples/**/*.rs'

tasks:
  # Lane runners — each invokes titania-check run-lane
  titania-fmt:
    command: 'titania-check run-lane fmt'
    toolchains: [rust]
    options: { runInCI: true }
    inputs: ['@globs(sources)', 'rustfmt.toml', '.titania/**', '!.titania/cache/**', '!.titania/out/**']
    outputs: ['.titania/out/edit/fmt.json', '.titania/out/prepush/fmt.json', '.titania/out/release/fmt.json']

  titania-compile:
    command: 'titania-check run-lane compile'
    env:
      CARGO_TARGET_DIR: '${workspace.root}/.titania/cache/compile'
    toolchains: [rust]
    options: { runInCI: true }
    inputs: ['@globs(sources)', 'Cargo.toml', 'Cargo.lock', '.cargo/**', 'rust-toolchain.toml']
    outputs: ['.titania/out/edit/compile.json', '.titania/out/prepush/compile.json', '.titania/out/release/compile.json']

  titania-clippy:
    command: 'titania-check run-lane clippy'
    env:
      CARGO_TARGET_DIR: '${workspace.root}/.titania/cache/clippy'
    toolchains: [rust]
    deps: ['~:titania-compile']
    options: { runInCI: true }
    inputs: ['@globs(sources)', 'clippy.toml', 'Cargo.toml', 'Cargo.lock', '.titania/**', '!.titania/cache/**', '!.titania/out/**']
    outputs: ['.titania/out/edit/clippy.json', '.titania/out/prepush/clippy.json', '.titania/out/release/clippy.json']

  titania-ast-grep:
    command: 'titania-check run-lane ast-grep'
    options: { runInCI: true }
    inputs: ['@globs(sources)']
    outputs: ['.titania/out/edit/ast-grep.json', '.titania/out/prepush/ast-grep.json', '.titania/out/release/ast-grep.json']

  titania-dylint:
    command: 'titania-check run-lane dylint'
    toolchains: [rust]
    options: { runInCI: true }
    inputs: ['@globs(sources)', 'Cargo.toml', 'Cargo.lock']
    outputs: ['.titania/out/edit/dylint.json', '.titania/out/prepush/dylint.json', '.titania/out/release/dylint.json']

  titania-panic-scan:
    command: 'titania-check run-lane panic-scan'
    options: { runInCI: true }
    inputs: ['@globs(sources)']
    outputs: ['.titania/out/edit/panic-scan.json', '.titania/out/prepush/panic-scan.json', '.titania/out/release/panic-scan.json']

  titania-policy-scan:
    command: 'titania-check run-lane policy-scan'
    options: { runInCI: true }
    inputs: ['@globs(sources)', 'Cargo.toml', '**/Cargo.toml', '.cargo/**', '.titania/**', '!.titania/cache/**', '!.titania/out/**']
    outputs: ['.titania/out/edit/policy-scan.json', '.titania/out/prepush/policy-scan.json', '.titania/out/release/policy-scan.json']

  titania-test:
    command: 'titania-check run-lane test'
    env:
      CARGO_TARGET_DIR: '${workspace.root}/.titania/cache/test'
    toolchains: [rust]
    deps: ['~:titania-compile']
    options: { runInCI: true }
    inputs: ['@globs(sources)', '@globs(tests)', 'Cargo.toml', 'Cargo.lock', '.cargo/**', 'rust-toolchain.toml']
    outputs: ['.titania/out/prepush/test.json', '.titania/out/release/test.json']

  titania-deny:
    command: 'titania-check run-lane deny'
    options: { runInCI: true }
    inputs: ['@globs(sources)', 'Cargo.lock', 'deny.toml']
    outputs: ['.titania/out/prepush/deny.json', '.titania/out/release/deny.json']

  titania-build:
    command: 'titania-check run-lane build'
    env:
      CARGO_TARGET_DIR: '${workspace.root}/.titania/cache/release'
    toolchains: [rust]
    deps: ['~:titania-compile']
    options: { runInCI: true }
    inputs: ['@globs(sources)', 'Cargo.toml', 'Cargo.lock', '.cargo/**', 'rust-toolchain.toml']
    outputs: ['.titania/out/release/build.json']

  # Composite gates
  gate-edit:
    command: 'titania-check aggregate --scope edit'
    deps: ['~:titania-fmt', '~:titania-compile', '~:titania-clippy', '~:titania-ast-grep', '~:titania-dylint', '~:titania-panic-scan', '~:titania-policy-scan']
    options: { runInCI: true }

  gate-prepush:
    command: 'titania-check aggregate --scope prepush'
    deps: ['~:gate-edit', '~:titania-test', '~:titania-deny']
    options: { runInCI: true }

  gate-release:
    command: 'titania-check aggregate --scope release'
    deps: ['~:gate-prepush', '~:titania-build']
    options: { runInCI: true }
