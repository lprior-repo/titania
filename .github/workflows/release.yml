# Titania release workflow.
#
# Triggered by a `v*` tag. Builds the `titania-check` release binary and the
# co-located `titania-dylint` cdylib across a Linux/macOS/Windows ×
# x86_64/aarch64 matrix, packages both into a single per-target archive named
# to match `[package.metadata.binstall]` in crates/titania-check/Cargo.toml:
#
#   titania-check-<target>-v<version>.tar.gz   (unix)
#   titania-check-<target>-v<version>.zip      (windows)
#
# and attaches every archive to the GitHub Release for the tag. The pinned
# toolchain (nightly-2026-04-27 + components) is taken from
# rust-toolchain.toml and mirrored into dtolnay/rust-toolchain so the runner
# installs the exact channel.
name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            archive: tar.gz
          - target: x86_64-apple-darwin
            runner: macos-13
            archive: tar.gz
          - target: aarch64-apple-darwin
            runner: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            archive: zip
          - target: aarch64-pc-windows-msvc
            runner: windows-latest
            archive: zip
    env:
      # Mirrors rust-toolchain.toml so dtolnay/rust-toolchain installs the
      # exact pinned channel and components.
      TITANIA_TOOLCHAIN: nightly-2026-04-27
      TITANIA_COMPONENTS: rustfmt,clippy,rust-src,llvm-tools-preview,rustc-dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.TITANIA_TOOLCHAIN }}
          components: ${{ env.TITANIA_COMPONENTS }}

      - name: Add build target
        run: rustup target add ${{ matrix.target }}

      - name: Install cross linker (aarch64-linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          mkdir -p "${HOME}/.cargo"
          {
            printf '[target.aarch64-unknown-linux-gnu]\n'
            printf 'linker = "aarch64-linux-gnu-gcc"\n'
          } >> "${HOME}/.cargo/config.toml"

      - name: Build binary and dylint cdylib
        run: cargo build --release --locked -p titania-check -p titania-dylint --target ${{ matrix.target }}

      - name: Stage release assets (unix)
        if: matrix.archive == 'tar.gz'
        run: |
          set -euo pipefail
          stage="${{ runner.temp }}/stage"
          mkdir -p "${stage}"
          bin="target/${{ matrix.target }}/release/titania-check"
          cdylib=$(find "target/${{ matrix.target }}/release" -maxdepth 1 \( -name 'libtitania_dylint.so' -o -name 'libtitania_dylint.dylib' -o -name 'titania_dylint.dll' \) -print -quit)
          cp "${bin}" "${stage}/titania-check"
          if [ -n "${cdylib}" ]; then cp "${cdylib}" "${stage}/"; fi
          archive="titania-check-${{ matrix.target }}-${{ github.ref_name }}.tar.gz"
          tar -C "${stage}" -czf "${archive}" .
          echo "asset=${archive}" >> "${GITHUB_ENV}"

      - name: Stage release assets (windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $stage = "${{ runner.temp }}\stage"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          $bin = "target\${{ matrix.target }}\release\titania-check.exe"
          Copy-Item $bin "$stage\titania-check.exe"
          $cdylib = Get-ChildItem "target\${{ matrix.target }}\release" -Filter "titania_dylint.dll" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($cdylib) { Copy-Item $cdylib.FullName $stage }
          $archive = "titania-check-${{ matrix.target }}-${{ github.ref_name }}.zip"
          Compress-Archive -Path "$stage\*" -DestinationPath $archive
          "asset=$archive" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.asset }}
          path: ${{ env.asset }}
          if-no-files-found: error

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.asset }}
          fail_on_unmatched_files: true
          generate_release_notes: true
