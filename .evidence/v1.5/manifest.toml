# (was per-harness with no cgroup prior to review-driven patches)
tool_version = "cargo-kani 0.67.0"
execution_model = "per_package"
execution_model_note = "One `cargo kani -p <pkg>` invocation per package (NOT per harness). Spec §4.2 step 4. Per-harness `VERIFICATION:` lines are parsed from the single combined stdout per package."
invocation_pattern = "cargo kani -p <pkg> --output-format=regular"
cgroup_wrapping = "systemd-run --user --scope -p MemoryMax=24G -p MemorySwapMax=0"
cgroup_probe = "systemd-run --version (graceful fallback if unavailable)"
cgroup_fallback = "bare cargo kani -p <pkg> (cgroup=fallback-no-systemd-run recorded in argv)"
