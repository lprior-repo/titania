[loom_test]
# Rewritten per review gap 17 — actually exercises atomic write (1 WRITER + 1 READER)
# (was compile-only / no writer inside the model prior to patch)
location = "crates/titania-lanes/tests/v15_atomic_baseline.rs"
cfg = "loom"
test_fn = "atomic_baseline_write_under_concurrent_read"
model = "loom::model"
writer_threads = 1
reader_threads = 1
writer_iterations_const = "WRITER_ITERATIONS = 5 (crates/titania-lanes/tests/v15_atomic_baseline.rs:39)"
reader_iterations_const = "READER_ITERATIONS = 5 (crates/titania-lanes/tests/v15_atomic_baseline.rs:44)"
payload_marker_const = "EXPECTED_ENTRY_COUNT = 2 (crates/titania-lanes/tests/v15_atomic_baseline.rs:50)"
writer_pattern = "write(payload) -> .titania-baseline-<stem>.tmp; rename(.tmp, final) — production atomic-rename path"
reader_observation = "MutantsBaseline::load(&path) — invariant: a successful load returns exactly EXPECTED_ENTRY_COUNT=2 entries (never 0, never 1, never partial)"
invariant_assertion = "any recorded successful load must have exactly EXPECTED_ENTRY_COUNT entries; partial / half-written / empty results are unreachable"
loom_max_preemptions = 2
loom_run_invocation = "RUSTFLAGS=\"--cfg loom\" cargo test --release --test v15_atomic_baseline LOOM_MAX_PREEMPTIONS=2"
loom_compile_invocation = "RUSTFLAGS=\"--cfg loom\" cargo check --tests -p titania-lanes"
failure_mode_caught_by_rewrite = "Production writer switched from `write + rename(temp -> final)` to bare `write(final)` would be caught: the reader under loom would observe entry-count < EXPECTED in the model."
retained_compile_only_status = true
retained_compile_only_note = "The source header documents `Compile-only`; the rewrite is exercised when nightlies wire `cargo test --cfg loom --release` into a tier-2 lane. Production deploys keep this gate `cfg(loom)` so the overhead is opt-in."

