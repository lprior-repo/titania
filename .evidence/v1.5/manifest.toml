error_definition = "crates/titania-core/src/error.rs:136 (MutantsBaselineError::WildcardMutationId)"
error_message = "mutants baseline entry at {path} has wildcard mutation_id '*'; wildcards are not allowed"
prior_vulnerability = "A hand-edited baseline `mutation_id: \"*\"` previously bypassed every MUTANT_SURVIVED finding. The lane's custom loader accepted wildcards verbatim; typed `MutantsBaseline::load` now rejects them so the only way to bypass the lane is to remove entries entirely."
mutation_id_validation = "All `MutantId::new` calls route through the typed constructor; `format!(...)`-built ids eliminated in the review-driven patch."
hostile_inputs_rejected = [
  "mutation_id == \"*\" (WildcardMutationId)",
  "empty package / empty rel_path (MutantIdError)",
  "line == 0 / col == 0 (MutantIdError)",
  "absolute rel_path (MutantIdError)",
  "unknown cargo-mutants operator string (MutantIdError)",
]

