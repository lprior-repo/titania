# MOON CI/CD IS THE ABSOLUTE FOUNDATION FOR ALL OF THIS WORK.
# Every lane Titania-check evaluates is a Moon task. Tasks here are the
# slice 1 surface: cargo-native idioms (fmt, lint-src, check, test, build,
# audit, geiger) + composites (ci, quick). When slice 2 lands
# titania-check binary and the dylint library, additional
# `titania-*` tasks bolt on without touching these foundational ones.
#
# Holzman Rust posture: source code ZERO clippy tolerance, tests compile
# with exact assertions but lenient on style. See moon-v2 skill.
#
# titania-lanes is a single workspace crate (`crates/titania-lanes`).
# Each bin target implements a typed Rust lane that produces a
# `LaneReport` (findings + lane exit). v1 P0 beads (`tn-2cn.*`,
# `tn-37r.*`, `tn-8ab.*`, `tn-cgk.*`, `tn-d2l.*`) replace these legacy
# adapters with v1-spec.md lanes (Fmt/Compile/Clippy/AstGrep/Dylint/
# PanicScan/PolicyScan/Test/Deny/Build). Keep the bin targets functional
# until each bead lands.

fileGroups:
  sources:
    - 'crates/**/*.rs'
    - 'titania/template/**'
    - 'Cargo.toml'
    - 'Cargo.lock'
    - 'rustfmt.toml'
    - '.titania/profiles/**'
  tests:
    - 'crates/**/tests/**/*.rs'
    - 'crates/**/*_test.rs'

tasks:
  # ---------- Cargo-native lanes ----------

  fmt:
    command: 'cargo fmt --all --check'
    toolchains: [rust]
    options:
      runInCI: true
    inputs:
      - 'crates/**/*.rs'
      - 'rustfmt.toml'

  lint-src:
    # ZERO TOLERANCE for source. Catches ALL clippy issues.
    command: 'cargo clippy --lib --bins --examples -- -D warnings -W clippy::all'
    toolchains: [rust]
    options:
      runInCI: true
    inputs:
      - 'crates/**/*.rs'
      - 'titania/template/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'clippy.toml'

  clippy-all:
    # Strict source lint. Tests compile and prove behavior, but test style is
    # intentionally kept out of clippy gates.
    command: 'cargo clippy --workspace --lib --bins --examples --all-features -- -D warnings -D clippy::unwrap_used -D clippy::expect_used -D clippy::panic'
    toolchains: [rust]
    options:
      runInCI: true
    inputs:
      - 'crates/**/*.rs'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'clippy.toml'

  check:
    command: 'cargo check --workspace --all-targets'
    toolchains: [rust]
    options:
      runInCI: true
    inputs:
      - 'crates/**/*.rs'
      - 'Cargo.toml'
      - 'Cargo.lock'

  test:
    # Lenient: tests verify behavior. No strict clippy enforcement.
    command: 'PATH="$HOME/.local/share/mise/shims:$HOME/.moon/bin:/usr/local/bin:/usr/bin:/bin:$PATH" cargo test --workspace --all-features'
    toolchains: [rust]
    options:
      runInCI: true
    inputs:
      - 'crates/**/*.rs'
      - 'Cargo.toml'
      - 'Cargo.lock'

  build:
    command: 'cargo build --workspace --release'
    toolchains: [rust]
    options:
      runInCI: true
    inputs:
      - 'crates/**/*.rs'
      - 'Cargo.toml'
      - 'Cargo.lock'
    outputs:
      - 'target/release/titania-check'

  audit:
    command: 'cargo audit'
    toolchains: [rust]
    options:
      runInCI: true
    inputs:
      - 'Cargo.lock'

  deny:
    command: 'cargo deny check'
    toolchains: [rust]
    options:
      runInCI: true
    inputs:
      - 'Cargo.lock'
      - 'deny.toml'

  geiger:
    # Zero-unsafe first-party surface report. cargo-geiger cannot run from
    # this virtual workspace manifest, so scope to concrete package manifests.
    script: >-
      cargo geiger --manifest-path "$MOON_WORKSPACE_ROOT/crates/titania-core/Cargo.toml" --all-features --forbid-only
      &&
      cargo geiger --manifest-path "$MOON_WORKSPACE_ROOT/crates/titania-lanes/Cargo.toml" --all-features --forbid-only
    toolchains: [rust]
    options:
      runInCI: true
    inputs:
      - 'crates/**/*.rs'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'crates/**/Cargo.toml'

  # ---------- titania-lanes: 28 cargo bin targets ----------

  titania-fmt:
    command: 'cargo run --quiet -p titania-check -- run-lane fmt'
    toolchains: [rust]
    options:
      runInCI: true
    inputs:
      - '@globs(sources)'
      - 'rustfmt.toml'
      - '.titania/**'
      - '!.titania/cache/**'
      - '!.titania/out/**'

    outputs:
      - '.titania/out/edit/fmt.json'
      - '.titania/out/prepush/fmt.json'
      - '.titania/out/release/fmt.json'

  titania-compile:
    command: 'CARGO_TARGET_DIR=".titania/cache/compile" cargo run --quiet -p titania-check -- run-lane compile'
    toolchains: [rust]
    options:
      runInCI: true
    inputs:
      - '@globs(sources)'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.cargo/**'
      - 'rust-toolchain.toml'

    outputs:
      - '.titania/out/edit/compile.json'
      - '.titania/out/prepush/compile.json'
      - '.titania/out/release/compile.json'

  titania-clippy:
    command: 'CARGO_TARGET_DIR=".titania/cache/clippy" cargo run --quiet -p titania-check -- run-lane clippy'
    deps: ['~:titania-compile']
    toolchains: [rust]
    options:
      runInCI: true
    inputs:
      - '@globs(sources)'
      - 'clippy.toml'
      - 'Cargo.toml'
      - '.titania/**'
      - '!.titania/cache/**'
      - '!.titania/out/**'

    outputs:
      - '.titania/out/edit/clippy.json'
      - '.titania/out/prepush/clippy.json'
      - '.titania/out/release/clippy.json'

  titania-ast-grep:
    command: 'cargo run --quiet -p titania-check -- run-lane ast-grep'
    options:
      runInCI: true
    inputs:
      - '@globs(sources)'

    outputs:
      - '.titania/out/edit/ast-grep.json'
      - '.titania/out/prepush/ast-grep.json'
      - '.titania/out/release/ast-grep.json'

  titania-dylint:
    command: 'PATH="$HOME/.local/share/mise/shims:$HOME/.cargo/bin:$PATH" cargo run --quiet -p titania-check -- run-lane dylint'
    toolchains: [rust]
    options:
      runInCI: true
    inputs:
      - '@globs(sources)'

    outputs:
      - '.titania/out/edit/dylint.json'
      - '.titania/out/prepush/dylint.json'
      - '.titania/out/release/dylint.json'

  titania-panic-scan:
    command: 'cargo run --quiet -p titania-check -- run-lane panic-scan'
    options:
      runInCI: true
    inputs:
      - '@globs(sources)'

    outputs:
      - '.titania/out/edit/panic-scan.json'
      - '.titania/out/prepush/panic-scan.json'
      - '.titania/out/release/panic-scan.json'

  titania-policy-scan:
    command: 'cargo run --quiet -p titania-check -- run-lane policy-scan'
    options:
      runInCI: true
    inputs:
      - '@globs(sources)'
      - 'Cargo.toml'
      - '**/Cargo.toml'
      - '.cargo/**'
      - '.titania/**'
      - '!.titania/cache/**'
      - '!.titania/out/**'

    outputs:
      - '.titania/out/edit/policy-scan.json'
      - '.titania/out/prepush/policy-scan.json'
      - '.titania/out/release/policy-scan.json'

  titania-test:
    command: 'PATH="$HOME/.local/share/mise/shims:$HOME/.cargo/bin:$PATH" CARGO_TARGET_DIR=".titania/cache/test" cargo run --quiet -p titania-check -- run-lane test'
    deps: ['~:titania-compile']
    toolchains: [rust]
    options:
      runInCI: true
    inputs:
      - '@globs(sources)'
      - '@globs(tests)'

    outputs:
      - '.titania/out/prepush/test.json'
      - '.titania/out/release/test.json'

  titania-deny:
    command: 'cargo run --quiet -p titania-check -- run-lane deny'
    options:
      runInCI: true
    inputs:
      - '@globs(sources)'
      - 'Cargo.lock'
      - 'deny.toml'

    outputs:
      - '.titania/out/prepush/deny.json'
      - '.titania/out/release/deny.json'

  titania-build:
    command: 'CARGO_TARGET_DIR=".titania/cache/release" cargo run --quiet -p titania-check -- run-lane build'
    deps: ['~:titania-compile']
    toolchains: [rust]
    options:
      runInCI: true
    inputs:
      - '@globs(sources)'
    outputs:
      - 'target/release/titania-check'
      - '.titania/out/release/build.json'

  gate-edit:
    command: 'cargo run --quiet -p titania-check -- aggregate --scope edit'
    deps: ['~:titania-fmt', '~:titania-compile', '~:titania-clippy', '~:titania-ast-grep', '~:titania-dylint', '~:titania-panic-scan', '~:titania-policy-scan']
    options:
      runInCI: true

  gate-prepush:
    command: 'cargo run --quiet -p titania-check -- aggregate --scope prepush'
    deps: ['~:gate-edit', '~:titania-test', '~:titania-deny']
    options:
      runInCI: true

  gate-release:
    command: 'cargo run --quiet -p titania-check -- aggregate --scope release'
    deps: ['~:gate-prepush', '~:titania-build']
    options:
      runInCI: true

  # ---------- Composites ----------


  ci:
    # Canonical Moon v2 CI gate. Runs affected targets, respects runInCI.
    deps:
      - '~:fmt'
      - '~:lint-src'
      - '~:clippy-all'
      - '~:check'
      - '~:test'
      - '~:audit'
      - '~:deny'
      - '~:geiger'
    options:
      runInCI: true

  quick:
    # Fast dev loop: format + source lint + type check. No tests, no build.
    deps:
      - '~:fmt'
      - '~:lint-src'
      - '~:check'
    options:
      runInCI: false

  pre-push:
    # Pre-push validation: full strict source lint + tests + audit + geiger.
    deps:
      - '~:fmt'
      - '~:clippy-all'
      - '~:test'
      - '~:audit'
      - '~:geiger'
    options:
      runInCI: true
