# Embedded ast-grep bypass-rule catalog for Titania v1.
# These rules reject local suppression/bypass mechanisms in production Rust.

id: BYPASS_ALLOW_ATTR
language: Rust
severity: error
message: "BYPASS_ALLOW_ATTR: remove item-level #[allow(...)] suppression"
files:
  - "**/*.rs"
ignores:
  - "**/fixtures/**"
  - "**/tests/**"
  - "**/benches/**"
  - "**/examples/**"
  - "**/build.rs"
rule:
  pattern: "#[allow($$$LINTS)]"
metadata:
  effect: Reject
  repair_hint: RemoveBypassAttribute
---
id: BYPASS_EXPECT_ATTR
language: Rust
severity: error
message: "BYPASS_EXPECT_ATTR: remove item-level #[expect(...)] suppression"
files:
  - "**/*.rs"
ignores:
  - "**/fixtures/**"
  - "**/tests/**"
  - "**/benches/**"
  - "**/examples/**"
  - "**/build.rs"
rule:
