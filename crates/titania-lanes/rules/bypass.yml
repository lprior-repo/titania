metadata:
  effect: Reject
  repair_hint: RemoveBypassAttribute
---
id: BYPASS_CFG_ATTR_ALLOW
language: Rust
severity: error
message: "BYPASS_CFG_ATTR_ALLOW: remove cfg_attr allow(...) suppression"
files:
  - "**/*.rs"
ignores:
  - "**/fixtures/**"
  - "**/tests/**"
  - "**/benches/**"
  - "**/examples/**"
  - "**/build.rs"
rule:
  pattern: "#[cfg_attr($COND, allow($$$LINTS))]"
metadata:
  effect: Reject
  repair_hint: RequiresHumanReview
---
