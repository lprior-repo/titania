---
id: BYPASS_INLINE_SUPPRESSION
language: Rust
severity: error
message: "BYPASS_INLINE_SUPPRESSION: remove ast-grep-ignore or sg-ignore inline suppression"
files:
  - "**/*.rs"
ignores:
  - "**/fixtures/**"
  - "**/tests/**"
  - "**/benches/**"
  - "**/examples/**"
  - "**/build.rs"
rule:
  any:
    - regex: "ast-grep-ignore"
    - regex: "sg-ignore"
metadata:
  effect: Reject
  repair_hint: RemoveInlineSuppression
---
id: BYPASS_GENERATED_INCLUDE
language: Rust
severity: error
message: "BYPASS_GENERATED_INCLUDE: do not include generated code through OUT_DIR"
files:
  - "**/*.rs"
ignores:
  - "**/fixtures/**"
  - "**/tests/**"
  - "**/benches/**"
  - "**/examples/**"
  - "**/build.rs"
rule:
  pattern: "include!(concat!(env!(\"OUT_DIR\"), $PATH))"
metadata:
  effect: Reject
  repair_hint: RequiresHumanReview
